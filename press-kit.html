<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Kit - TICORI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #2d3436 0%, #1e272e 100%);
            color: #dfe6e9;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(88, 176, 141, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(52, 152, 219, 0.12) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 40px 0;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            color: #58b08d;
            text-decoration: none;
            margin-bottom: 20px;
            opacity: 0.9;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            opacity: 1;
            text-shadow: 0 0 10px rgba(88, 176, 141, 0.5);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .section {
            background: rgba(30, 39, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin: 30px auto;
            border: 1px solid rgba(88, 176, 141, 0.3);
        }

        .section h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .section h3 {
            font-size: 1.3rem;
            margin: 25px 0 10px;
            font-weight: 600;
        }

        .section p, .section li {
            font-size: 1rem;
            line-height: 1.8;
            opacity: 0.9;
        }

        .factsheet {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .fact-item {
            background: rgba(20, 25, 30, 0.5);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(88, 176, 141, 0.2);
        }

        .fact-label {
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .fact-value {
            font-size: 1.1rem;
        }

        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .asset-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .asset-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .asset-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .asset-title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .asset-desc {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-block;
            background: #fff;
            color: #457b9d;
            text-decoration: none;
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .contact-info {
            background: rgba(20, 25, 30, 0.5);
            padding: 25px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid rgba(88, 176, 141, 0.2);
        }

        .contact-item {
            margin: 15px 0;
        }

        .contact-label {
            font-weight: 700;
            display: inline-block;
            min-width: 120px;
        }

        .contact-value {
            opacity: 0.9;
        }

        .contact-value a {
            color: #58b08d;
            text-decoration: none;
            border-bottom: 1px solid rgba(88, 176, 141, 0.5);
            transition: all 0.3s ease;
        }

        .contact-value a:hover {
            color: #6dd5b4;
            text-shadow: 0 0 10px rgba(88, 176, 141, 0.5);
        }

        ul {
            margin-left: 20px;
            margin-top: 10px;
        }

        li {
            margin: 8px 0;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .section {
                padding: 30px 20px;
            }

            .section h2 {
                font-size: 1.5rem;
            }

            .factsheet {
                grid-template-columns: 1fr;
            }

            .contact-label {
                display: block;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">← Back to Home</a>
            <h1>📰 Press Kit</h1>
        </header>

        <div class="section">
            <h2>Factsheet</h2>
            <div class="factsheet">
                <div class="fact-item">
                    <div class="fact-label">Studio Name</div>
                    <div class="fact-value">TICORI LLC</div>
                </div>
                <div class="fact-item">
                    <div class="fact-label">Founded</div>
                    <div class="fact-value">2026</div>
                </div>
                <div class="fact-item">
                    <div class="fact-label">Location</div>
                    <div class="fact-value">United States</div>
                </div>
                <div class="fact-item">
                    <div class="fact-label">Team Size</div>
                    <div class="fact-value">Independent</div>
                </div>
                <div class="fact-item">
                    <div class="fact-label">Focus</div>
                    <div class="fact-value">Indie Game Development</div>
                </div>
                <div class="fact-item">
                    <div class="fact-label">Contact</div>
                    <div class="fact-value">contact@ticori.gg</div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 TICORI LLC. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
