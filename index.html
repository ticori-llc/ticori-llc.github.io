<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICORI - Indie Game Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #090b0a;
            color: #c8cfc9;
            overflow-x: hidden;
        }

        /* Grain / texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        /* Top nav bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(9, 11, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(88, 176, 141, 0.08);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
        }

        .nav-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            filter: invert(1);
            opacity: 0.9;
        }

        .nav-name {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #58b08d;
        }

        .nav-social {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .nav-social a {
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
            display: flex;
        }

        .nav-social a:hover {
            color: #58b08d;
        }

        .nav-social svg {
            width: 16px;
            height: 16px;
        }

        /* Main content */
        main {
            padding-top: 64px;
        }

        /* Featured game — full bleed hero */
        .featured {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .featured-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 30%, rgba(88, 176, 141, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 80%, rgba(40, 80, 65, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 60%, rgba(88, 176, 141, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        /* Animated particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(88, 176, 141, 0.4);
            border-radius: 50%;
            opacity: 0;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .featured-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 60px 20px;
            max-width: 700px;
        }

        .featured-badge {
            display: inline-block;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #58b08d;
            border: 1px solid rgba(88, 176, 141, 0.3);
            padding: 6px 18px;
            border-radius: 100px;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .featured-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .featured-subtitle {
            font-size: 1.15rem;
            line-height: 1.7;
            opacity: 0.55;
            max-width: 520px;
            margin: 0 auto 40px;
        }

        .steam-widget-wrap {
            display: inline-block;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        .steam-widget-wrap iframe {
            display: block;
        }

        .featured-divider {
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(88, 176, 141, 0.3), transparent);
            margin: 0 auto;
            position: absolute;
            bottom: 0;
            left: 50%;
        }

        /* About section */
        .about {
            padding: 100px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .about-logo {
            width: 160px;
            height: 160px;
            flex-shrink: 0;
            filter: invert(1);
            opacity: 0.12;
        }

        .about-text h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
        }

        .about-text p {
            line-height: 1.8;
            opacity: 0.5;
            font-size: 1rem;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-copy {
            font-size: 0.75rem;
            opacity: 0.25;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #58b08d;
        }

        @media (max-width: 768px) {
            nav {
                padding: 0 20px;
            }

            .nav-links {
                display: none;
            }

            .featured-title {
                font-size: 2.2rem;
            }

            .featured-subtitle {
                font-size: 1rem;
            }

            .steam-widget-wrap iframe {
                width: 100%;
                max-width: 646px;
            }

            .about {
                flex-direction: column;
                padding: 60px 20px;
                gap: 30px;
                text-align: center;
            }

            .about-logo {
                width: 100px;
                height: 100px;
            }

            footer {
                flex-direction: column;
                gap: 12px;
                text-align: center;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">
            <span class="nav-name">Ticori</span>
        </a>
        <div class="nav-links">
            <a href="#games">Games</a>
            <a href="press-kit.html">Press</a>
        </div>
        <div class="nav-social">
            <a href="https://x.com/ticori_llc" target="_blank" aria-label="X (Twitter)">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </a>
            <a href="https://discord.gg/7MvX9VxjQc" target="_blank" aria-label="Discord">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
            </a>
            <a href="https://youtube.com/@ticori-llc" target="_blank" aria-label="YouTube">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </a>
        </div>
    </nav>

    <main>
        <section class="featured" id="games">
            <div class="featured-bg"></div>
            <div class="particles" id="particles"></div>
            <div class="featured-content">
                <span class="featured-badge">Coming Soon</span>
                <h1 class="featured-title">Something is brewing...</h1>
                <p class="featured-subtitle">Follow us for updates as we reveal more.</p>
                <div class="steam-widget-wrap">
                    <iframe src="https://store.steampowered.com/widget/4514010/" frameborder="0" width="646" height="190"></iframe>
                </div>
            </div>
            <div class="featured-divider"></div>
        </section>

        <section class="about">
            <div class="about-text">
                <h2>About Ticori</h2>
                <p>We're an independent game studio building the kinds of games we've always wanted to play. Stay tuned for what's next.</p>
            </div>
        </section>
    </main>

    <footer>
        <span class="footer-copy">&copy; 2026 TICORI LLC</span>
        <div class="footer-links">
            <a href="press-kit.html">Press Kit</a>
            <a href="mailto:info@ticori.gg">info@ticori.gg</a>
        </div>
    </footer>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
            container.appendChild(p);
        }
    </script>
</body>
</html>
