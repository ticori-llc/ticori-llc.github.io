<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICORI - Indie Game Studio</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #080f0b;
            color: #9aaa9e;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            color: #e0ece5;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 60px;
            background: rgba(8, 15, 11, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(80, 200, 120, 0.08);
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e0ece5;
            letter-spacing: 0.08em;
        }

        .nav-links {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #708a7a;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #e0ece5;
        }

        .nav-social {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }

        .nav-social a {
            color: #708a7a;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .nav-social a:hover {
            color: #e0ece5;
        }

        .nav-links a.active {
            color: #50c878;
        }

        /* Hero */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .badge {
            display: inline-block;
            color: #50c878;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border: 1px solid rgba(80, 200, 120, 0.35);
            border-radius: 999px;
            padding: 0.4rem 1.2rem;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .hero .subtitle {
            font-size: 1.1rem;
            color: #9aaa9e;
            max-width: 480px;
            margin-bottom: 0.75rem;
        }

        .widget-note {
            font-size: 0.75rem;
            color: rgba(154, 170, 158, 0.4);
            margin-bottom: 2rem;
        }

        .steam-widget {
            max-width: 646px;
            width: 100%;
        }

        .steam-widget iframe {
            width: 100%;
            height: 190px;
            border: none;
            border-radius: 4px;
        }

        /* About */
        .about {
            max-width: 640px;
            margin: 0 auto;
            padding: 6rem 2rem;
            text-align: center;
        }

        .about h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .about p {
            font-size: 1.05rem;
            line-height: 1.7;
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(80, 200, 120, 0.08);
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            color: rgba(154, 170, 158, 0.4);
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-links a {
            color: rgba(154, 170, 158, 0.4);
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #6ee898;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 0 1.25rem;
            }

            .nav-links {
                gap: 1.25rem;
            }

            .nav-links a {
                font-size: 0.8rem;
            }

            .nav-social {
                gap: 1rem;
            }

            .hero {
                padding: 1.5rem;
            }

            .about {
                padding: 4rem 1.5rem;
            }

            footer {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <nav>

        </div>
    </nav>

    <section class="hero" id="games">
        <span class="badge">Coming Soon</span>
        <h1>Something is brewing.</h1>
        <p class="subtitle">A new game is in the works. Stay tuned.</p>
        <p class="widget-note">(The widget below will error out because the game isn't public yet.)</p>
        <div class="steam-widget">
            <iframe src="https://store.steampowered.com/widget/4514010/" frameborder="0" width="646" height="190"></iframe>
        </div>
    </section>

    <section class="about">
        <h2>About TICORI</h2>
        <p>TICORI is a small indie game studio focused on building games we want to play.</p>
    </section>

    <footer>
        <span>&copy; 2026 TICORI LLC</span>
        <div class="footer-links">
            <a href="press-kit.html">Press</a>
            <a href="mailto:info@ticori.gg">Contact</a>
        </div>
    </footer>

</body>
</html>
