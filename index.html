<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICORI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #2d3436 0%, #1e272e 100%);
            color: #dfe6e9;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(88, 176, 141, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(52, 152, 219, 0.12) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 40px 0;
            text-align: center;
        }

        .logo-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo-image {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
        }

        .hero {
            text-align: center;
            padding: 60px 0;
        }

        .mystery-box {
            background: rgba(30, 39, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            margin: 40px auto;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(88, 176, 141, 0.3);
        }

        .mystery-title {
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .character-slot {
            position: relative;
            margin: 40px auto;
            width: 300px;
            height: 300px;
            cursor: pointer;
        }

        .character-frame {
            width: 100%;
            height: 100%;
            background: rgba(20, 25, 30, 0.9);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            transition: all 0.3s ease;
            box-shadow: 
                0 10px 40px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(88, 176, 141, 0.2);
            border: 2px solid rgba(88, 176, 141, 0.4);
            position: relative;
            overflow: hidden;
        }

        .character-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(88, 176, 141, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .character-slot:hover .character-frame {
            transform: scale(1.05);
            border-color: rgba(88, 176, 141, 0.7);
            box-shadow: 
                0 15px 50px rgba(0,0,0,0.7),
                0 0 30px rgba(88, 176, 141, 0.3),
                inset 0 1px 0 rgba(88, 176, 141, 0.3);
        }

        .lock-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            opacity: 0.4;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(88, 176, 141, 0.5));
        }

        .character-slot:hover .lock-icon {
            opacity: 0.6;
            filter: drop-shadow(0 0 15px rgba(88, 176, 141, 0.7));
        }

        .question-mark {
            font-size: 150px;
            opacity: 0.2;
            text-shadow: 0 0 20px rgba(88, 176, 141, 0.4);
        }

        .character-slot.unlocked .character-frame {
            background: linear-gradient(135deg, #81c784 0%, #66bb6a 100%);
            animation: unlock 0.6s ease;
            border-color: #fff;
        }

        .character-slot.unlocked .lock-icon,
        .character-slot.unlocked .question-mark {
            display: none;
        }

        .character-slot.unlocked .character-frame::before {
            background: none;
        }

        @keyframes unlock {
            0% { 
                transform: scale(1);
                filter: brightness(1);
            }
            25% {
                transform: scale(1.1) rotate(-5deg);
                filter: brightness(1.5);
            }
            50% { 
                transform: scale(1.15) rotate(5deg);
                filter: brightness(2);
            }
            75% {
                transform: scale(1.1) rotate(-3deg);
                filter: brightness(1.5);
            }
            100% { 
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
        }

        .unlock-text {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
            font-style: italic;
        }

        .game-title {
            font-size: 1.8rem;
            margin-top: 20px;
            opacity: 1;
            font-weight: 700;
        }

        .about {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            margin: 60px auto;
            max-width: 800px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .about h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .about p {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.9;
        }

        .press-kit {
            text-align: center;
            padding: 40px;
            margin: 40px auto 60px;
        }

        .press-kit p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .press-kit .contact-email {
            color: #58b08d;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(88, 176, 141, 0.5);
            margin-bottom: 20px;
            display: inline-block;
        }

        .press-kit .contact-email:hover {
            color: #6dd5b4;
            text-shadow: 0 0 10px rgba(88, 176, 141, 0.5);
            border-bottom-color: #6dd5b4;
        }

        .press-kit a.press-link {
            color: #58b08d;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(88, 176, 141, 0.5);
            display: inline-block;
            margin-top: 20px;
        }

        .press-kit a.press-link:hover {
            color: #6dd5b4;
            text-shadow: 0 0 10px rgba(88, 176, 141, 0.5);
            border-bottom-color: #6dd5b4;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            opacity: 0.7;
        }

        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            color: #58b08d;
            text-decoration: none;
            margin: 0 15px;
            font-size: 2rem;
            transition: all 0.3s ease;
            display: inline-block;
            opacity: 0.8;
        }

        .social-links a:hover {
            opacity: 1;
            transform: translateY(-3px);
            filter: drop-shadow(0 0 10px rgba(88, 176, 141, 0.6));
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .mystery-title {
                font-size: 1.5rem;
            }

            .character-slot {
                width: 250px;
                height: 250px;
            }

            .question-mark {
                font-size: 120px;
            }

            .lock-icon {
                font-size: 60px;
            }

            .about h2, .press-kit h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
